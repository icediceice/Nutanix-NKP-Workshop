# Shared ClusterRole granting workshop session service accounts read-only access
# to cluster-scoped resources needed for workshop exercises.
# Applied once at cluster setup; sessions bind to it via session.objects in each Workshop spec.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nkp-workshop-cluster-reader
rules:
# Cluster-scoped resources
- apiGroups: [""]
  resources:
  - nodes
  - persistentvolumes
  - namespaces
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources:
  - storageclasses
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources:
  - nodes
  verbs: ["get", "list", "watch"]
# Namespace-scoped resources (needed for kubectl cluster-info, get pods, etc.)
- apiGroups: [""]
  resources:
  - services
  - endpoints
  - pods
  - pods/log
  - configmaps
  - events
  - replicationcontrollers
  - resourcequotas
  - limitranges
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
  - ingresses
  - networkpolicies
  verbs: ["get", "list", "watch"]
