# Redirect kommander.nkp.nuth-lab.xyz → sslip/dkp/kommander/dashboard.
# Auth happens entirely on sslip domain (forwardauth cookie is sslip-scoped).
# Using plain redirect here avoids cross-domain cookie loop.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-kommander-sslip
  namespace: kommander
spec:
  redirectRegex:
    regex: ".*"
    replacement: "https://nkp-10-38-49-16.sslip.nutanixdemo.com/dkp/kommander/dashboard"
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kommander-nuth-lab
  namespace: kommander
  annotations:
    ingress.kubernetes.io/force-ssl-redirect: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "kommander-redirect-to-kommander-sslip@kubernetescrd"
spec:
  ingressClassName: kommander-traefik
  tls:
    - hosts:
        - kommander.nkp.nuth-lab.xyz
      secretName: nkp-nuth-lab-tls
  rules:
    - host: kommander.nkp.nuth-lab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kommander
                port:
                  number: 80
---
# IngressRoutes on websecure (port 443) for sslip domain.
# Traefik v3 web-entrypoint routes don't mirror to port 443 — explicit routes needed.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-oauth
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/_oauth`)
      services:
        - name: traefik-forward-auth-mgmt
          port: 4181
  tls: {}
---
# Redirect sslip root / → /dkp/kommander/dashboard so SPA relative assets resolve.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sslip-root-redirect
  namespace: kommander
spec:
  redirectRegex:
    regex: "^https://nkp-10-38-49-16\\.sslip\\.nutanixdemo\\.com/$"
    replacement: "https://nkp-10-38-49-16.sslip.nutanixdemo.com/dkp/kommander/dashboard"
    permanent: false
---
# Dex auth provider on HTTPS — NO forwardauth (Dex IS the auth provider).
# /dex and /token must not hit forwardauth or the OAuth loop fires.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-dex
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/dex`) || PathPrefix(`/token`)
      services:
        - name: dex
          port: 32000
          scheme: https
  tls: {}
---
# Only /dkp paths get forwardauth — avoids looping on /dex or /_oauth.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-kommander
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/dkp`)
      middlewares:
        - name: forwardauth
      services:
        - name: kommander
          port: 80
  tls: {}
