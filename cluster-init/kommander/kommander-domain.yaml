apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kommander-nuth-lab
  namespace: kommander
  annotations:
    ingress.kubernetes.io/force-ssl-redirect: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "kommander-forwardauth@kubernetescrd"
spec:
  ingressClassName: kommander-traefik
  tls:
    - hosts:
        - kommander.nkp.nuth-lab.xyz
      secretName: nkp-nuth-lab-tls
  rules:
    - host: kommander.nkp.nuth-lab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kommander
                port:
                  number: 80
---
# IngressRoutes on websecure (port 443) for sslip domain.
# The web-entrypoint ingresses only register on port 80 in Traefik v3,
# so HTTPS hits on the sslip domain get 404. These routes fix that.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-oauth
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/_oauth`)
      services:
        - name: traefik-forward-auth-mgmt
          port: 4181
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sslip-root-redirect
  namespace: kommander
spec:
  redirectRegex:
    regex: "^https://nkp-10-38-49-16\\.sslip\\.nutanixdemo\\.com/$"
    replacement: "https://nkp-10-38-49-16.sslip.nutanixdemo.com/dkp/kommander/dashboard"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-kommander
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/`)
      middlewares:
        - name: sslip-root-redirect
      services:
        - name: kommander
          port: 80
  tls: {}
