# Redirect kommander.nkp.nuth-lab.xyz → sslip/dkp/kommander/dashboard.
# Auth happens entirely on sslip domain (forwardauth cookie is sslip-scoped).
# Using plain redirect here avoids cross-domain cookie loop.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-kommander-sslip
  namespace: kommander
spec:
  redirectRegex:
    regex: ".*"
    replacement: "https://nkp-10-38-49-16.sslip.nutanixdemo.com/dkp/kommander/dashboard"
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kommander-nuth-lab
  namespace: kommander
  annotations:
    ingress.kubernetes.io/force-ssl-redirect: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "kommander-redirect-to-kommander-sslip@kubernetescrd"
spec:
  ingressClassName: kommander-traefik
  tls:
    - hosts:
        - kommander.nkp.nuth-lab.xyz
      secretName: nkp-nuth-lab-tls
  rules:
    - host: kommander.nkp.nuth-lab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kommander
                port:
                  number: 80
---
# Dex auth provider on HTTPS — lab-kom Dex Ingress has entrypoints:web only,
# so explicit websecure IngressRoute needed. No forwardauth — Dex IS the auth provider.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sslip-websecure-dex
  namespace: kommander
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: PathPrefix(`/dex`) || PathPrefix(`/token`)
      services:
        - name: dex
          port: 32000
          scheme: https
  tls: {}
---
# TFA callback — matches working NKP cluster pattern.
# No entrypoints annotation → Traefik registers on ALL entrypoints including websecure.
# forwardauth middleware means TFA receives X-Forwarded-Uri: /_oauth?code=... and
# correctly handles the OIDC callback, sets cookie, redirects to rd.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tfa-oauth
  namespace: kommander
  annotations:
    kubernetes.io/ingress.class: kommander-traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "kommander-stripprefixes@kubernetescrd,kommander-forwardauth@kubernetescrd"
spec:
  rules:
    - http:
        paths:
          - path: /_oauth
            pathType: Prefix
            backend:
              service:
                name: traefik-forward-auth-mgmt
                port:
                  number: 4181
---
# Kommander UI — matches working NKP cluster pattern.
# stripprefixes strips /dkp/kommander/dashboard so kommander receives request at root.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kommander-ui
  namespace: kommander
  annotations:
    kubernetes.io/ingress.class: kommander-traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "kommander-stripprefixes@kubernetescrd,kommander-forwardauth@kubernetescrd"
spec:
  rules:
    - http:
        paths:
          - path: /dkp/kommander/dashboard
            pathType: Prefix
            backend:
              service:
                name: kommander
                port:
                  number: 80
