apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: apex-to-bls-workshop
  namespace: nkp-workshop-portal-ui
spec:
  redirectRegex:
    regex: ".*"
    replacement: "https://nkp-workshop-portal-ui.nkp.nuth-lab.xyz/workshops/environment/nkp-workshop-portal-w10/create/"
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apex-redirect
  namespace: nkp-workshop-portal-ui
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "nkp-workshop-portal-ui-apex-to-bls-workshop@kubernetescrd"
    ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: kommander-traefik
  tls:
    - hosts:
        - nkp.nuth-lab.xyz
      secretName: nkp-nuth-lab-tls
  rules:
    - host: nkp.nuth-lab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: training-portal
                port:
                  number: 80
