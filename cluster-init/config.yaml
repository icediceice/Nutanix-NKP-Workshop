# cluster-init/config.yaml
# Copy to config.local.yaml and fill in values before running init.sh.
# config.local.yaml is gitignored — never commit credentials.

# --- Cluster Connection ---
kubeconfig_path: ~/.kube/config        # Path to kubeconfig file
cluster_context: nkp-workshop          # kubectl context name

# --- Platform Config ---
storage_class: nutanix-volume          # Nutanix CSI storage class
metallb_ip_range: "10.168.100.20-10.168.100.30"
ingress_domain: workshop.nkp-lab.local # Base domain for ingress rules

# --- Educates Config ---
educates_version: "3.7.0"             # Pin to a stable version (tag format: no v-prefix)
educates_ingress_domain: 10.38.49.19.nip.io
educates_ingress_class: ""            # IngressClass name — leave empty for cluster default, e.g. kommander-traefik
educates_infra_provider: generic      # eks | gke | kind | custom | vcluster | generic | minikube | openshift
educates_policy_engine: kyverno       # kyverno | none

# --- Registration App ---
registration_app_nodeport: 30080
admin_password: ""                    # Set per-session — leave empty during testing

# --- NUS / S3 Config (for storage course exercises) ---
s3_endpoint: "https://objects.nkp-lab.local"
s3_access_key: ""
s3_secret_key: ""

# --- Management Cluster ---
kommander_mgmt_ip: ""                 # IP of the NKP management cluster — used to build sslip redirect URL

# --- Workshop Session Config ---
session_label: "workshop-2026-03"     # Used to label and identify workshop namespaces
max_concurrent_sessions: 30

# --- Harbor Registry (Developer track) ---
harbor_url: "https://harbor.nkp-lab.local"
harbor_project: "workshop"

# --- GitLab (Developer track CI/CD) ---
gitlab_url: "https://gitlab.nkp-lab.local"
