name: Build & Push Registration App Images

on:
  push:
    branches: [main]
    paths:
      - "registration-app/**"
      - ".github/workflows/build-images.yaml"
  workflow_dispatch:         # allow manual trigger

env:
  REGISTRY: ghcr.io
  # Use full repo-scoped path — required for GITHUB_TOKEN push to GHCR
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/nkp-lab-manager-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/nkp-lab-manager-frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./registration-app
          file: ./registration-app/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./registration-app
          file: ./registration-app/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
