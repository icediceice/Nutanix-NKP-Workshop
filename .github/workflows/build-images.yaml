name: Build & Push Registration App Images

on:
  push:
    branches: [main]
    paths:
      - "registration-app/**"
      - ".github/workflows/build-images.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push backend
        run: |
          docker build \
            -f registration-app/Dockerfile.backend \
            -t ghcr.io/icediceice/nkp-lab-manager-backend:latest \
            -t ghcr.io/icediceice/nkp-lab-manager-backend:${{ github.sha }} \
            registration-app/
          docker push ghcr.io/icediceice/nkp-lab-manager-backend:latest
          docker push ghcr.io/icediceice/nkp-lab-manager-backend:${{ github.sha }}

      - name: Build & push frontend
        run: |
          docker build \
            -f registration-app/Dockerfile.frontend \
            -t ghcr.io/icediceice/nkp-lab-manager-frontend:latest \
            -t ghcr.io/icediceice/nkp-lab-manager-frontend:${{ github.sha }} \
            registration-app/
          docker push ghcr.io/icediceice/nkp-lab-manager-frontend:latest
          docker push ghcr.io/icediceice/nkp-lab-manager-frontend:${{ github.sha }}
