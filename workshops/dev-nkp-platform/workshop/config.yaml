apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: dev-nkp-platform
spec:
  title: "NKP Platform for Developers"
  description: >
    Explore the NKP platform services available to developers: Harbor registry, observability
    tools, application catalog, FluxCD GitOps, and Istio service mesh.
  workshop:
    files:
      - image:
          url: $(image_repository)/dev-nkp-platform-files:latest
  session:
    namespaces:
      budget: medium
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: false
      console:
        enabled: true
