apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: containers-docker
spec:
  title: "Containers and Docker"
  description: >
    Build, run, and publish container images. Understand Dockerfile anatomy, multi-stage builds,
    and how to push images to a private Harbor registry on NKP.
  workshop:
    files:
      - image:
          url: $(image_repository)/containers-docker-files:latest
  session:
    namespaces:
      budget: small
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      docker:
        enabled: true
