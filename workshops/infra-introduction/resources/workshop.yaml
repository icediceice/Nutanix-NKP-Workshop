apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: infra-introduction
spec:
  title: "Introduction to Infrastructure"
  description: "Infrastructure under Kubernetes, Cluster-API concepts, NKP cluster provisioning"
  url: "https://github.com/icediceice/Nutanix-NKP-Workshop"
  workshop:
    files:
      - image:
          url: "ghcr.io/icediceice/infra-introduction-files:latest"
        includePaths:
          - /workshop/**
  session:
    namespaces:
      budget: medium
      security:
        policy: baseline
    applications:
      terminal:
        enabled: true
      console:
        enabled: true     # For examining CAPI resources in K8s dashboard
      editor:
        enabled: false
      docker:
        enabled: false
      registry:
        enabled: false

    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: $(session_name)-cluster-reader
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: nkp-workshop-cluster-reader
      subjects:
      - kind: ServiceAccount
        name: $(session_name)
        namespace: $(session_namespace)
