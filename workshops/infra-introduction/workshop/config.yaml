apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: infra-introduction
spec:
  title: "Infrastructure Introduction"
  description: >
    Understand the infrastructure that runs beneath Kubernetes: the Nutanix HCI platform,
    Cluster API concepts, and how NKP provisions clusters on Nutanix AHV.
  workshop:
    files:
      - image:
          url: $(image_repository)/infra-introduction-files:latest
  session:
    namespaces:
      budget: small
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: false
      console:
        enabled: false
