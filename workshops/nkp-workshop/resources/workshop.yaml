apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: nkp-workshop
spec:
  title: "NKP Hands-On Workshop"
  description: "Deploy, observe, ship, troubleshoot, and govern — hands-on with a live NKP cluster."
  url: https://github.com/icediceice/Nutanix-NKP-Workshop

  publish:
    image: ghcr.io/icediceice/nkp-workshop-files:latest

  workshop:
    files:
      - image:
          url: ghcr.io/icediceice/nkp-workshop-files:latest
      # Git overlay: provides fixed setup.d scripts directly from repo,
      # overriding the stale published image version (CRLF + set -e issue).
      - git:
          url: https://github.com/icediceice/Nutanix-NKP-Workshop
          ref: main
        newRootPath: workshops/nkp-workshop

  session:
    namespaces:
      budget: x-large
      limits:
        max:
          cpu: "16"
          memory: "32Gi"
      security:
        policy: privileged
      secondary:
        - name: $(session_name)-ops
          budget: small
          security:
            policy: baseline

    applications:
      workshop:
        enabled: true
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      examiner:
        enabled: true
      console:
        enabled: false
      docker:
        enabled: false
      vcluster:
        enabled: false

    dashboards:
      - name: Storefront
        url: https://frontend-$(session_name).$(ingress_domain)/
      - name: ArgoCD
        url: https://$(ingress_domain)/dkp/argocd/applications/argocd/rx-demo-$(session_name)
      - name: Kiali
        url: https://$(ingress_domain)/dkp/kiali/console/graph/namespaces/?namespaces=$(session_namespace)
      - name: Jaeger
        url: https://$(ingress_domain)/dkp/jaeger/search?service=frontend&namespace=$(session_namespace)
      - name: Grafana
        url: https://$(ingress_domain)/dkp/logging/grafana
      - name: Demo Wall
        url: https://demo-wall-$(session_name).$(ingress_domain)/
      - name: NKP Console
        url: https://10.8.16.16/dkp/kommander/dashboard

    env:
      - name: WORKSHOP_NAMESPACE
        value: $(session_namespace)
      - name: OPS_NAMESPACE
        value: $(session_name)-ops
      - name: ARGOCD_NAMESPACE
        value: argocd
      - name: SESSION_NAME
        value: $(session_name)
      - name: ARGOCD_APP
        value: rx-demo-$(session_name)
      - name: dkp_username
        value: jovial_haibt
      - name: dkp_password
        value: yKJFbW9TIVNNyU064dnxmvINmPOrEmHkZzH09OcWTxCwZo4NunvoPgJMJ7j3zKR6

    objects:
      # Per-session ClusterRole + ClusterRoleBinding for demo-wall.
      # These are cluster-scoped and cannot be reliably renamed by kustomize
      # patches in ArgoCD — managed here instead so Educates substitutes
      # $(session_namespace) correctly for each session.
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: demo-wall-reader-$(session_namespace)
        rules:
          - apiGroups: [""]
            resources: ["namespaces", "nodes", "pods", "services", "resourcequotas", "events"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments", "replicasets", "statefulsets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["argoproj.io"]
            resources: ["applications"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["networking.istio.io"]
            resources: ["virtualservices", "destinationrules"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["constraints.gatekeeper.sh"]
            resources: ["*"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["keda.sh"]
            resources: ["scaledobjects"]
            verbs: ["get", "list", "watch"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: demo-wall-reader-$(session_namespace)
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: demo-wall-reader-$(session_namespace)
        subjects:
          - kind: ServiceAccount
            name: demo-wall
            namespace: $(session_namespace)
      # Grant cluster-read access so attendees can run kubectl get nodes/namespaces/pv/sc
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: $(session_name)-cluster-reader
        rules:
          - apiGroups: [""]
            resources: ["nodes", "namespaces", "persistentvolumes"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses"]
            verbs: ["get", "list", "watch"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: $(session_name)-cluster-reader
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: $(session_name)-cluster-reader
        subjects:
          - kind: ServiceAccount
            name: $(session_name)
            namespace: $(environment_name)
      # Grant session SA permission to patch its own ArgoCD Application.
      # Required by switch-lab.sh which runs: kubectl -n argocd patch application rx-demo-$(session_name)
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: $(session_name)-argocd-app-patcher
          namespace: argocd
        rules:
          - apiGroups: ["argoproj.io"]
            resources: ["applications"]
            resourceNames: ["rx-demo-$(session_name)"]
            verbs: ["get", "patch", "update"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: $(session_name)-argocd-app-patcher
          namespace: argocd
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: $(session_name)-argocd-app-patcher
        subjects:
          - kind: ServiceAccount
            name: $(session_name)
            namespace: $(environment_name)
      # Expose storefront frontend and demo-wall via Traefik so attendees'
      # browsers can reach them. svc.cluster.local URLs don't resolve outside
      # the cluster — these Ingresses create per-session external hostnames.
      - apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: frontend
          namespace: $(session_namespace)
          annotations:
            kubernetes.io/ingress.class: kommander-traefik
            traefik.ingress.kubernetes.io/router.tls: "true"
        spec:
          rules:
            - host: frontend-$(session_name).$(ingress_domain)
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: frontend
                        port:
                          number: 80
      - apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: demo-wall
          namespace: $(session_namespace)
          annotations:
            kubernetes.io/ingress.class: kommander-traefik
            traefik.ingress.kubernetes.io/router.tls: "true"
        spec:
          rules:
            - host: demo-wall-$(session_name).$(ingress_domain)
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: demo-wall
                        port:
                          number: 9090
      - apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: rx-demo-$(session_name)
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/icediceice/Nutanix-NKP-Workshop.git
            targetRevision: main
            path: workshops/nkp-workshop/apps/storefront/overlays/lab-01-start
            kustomize:
              # Override all resource namespaces to the per-session namespace.
              # kustomize namespace transformer also updates ClusterRoleBinding subjects[].
              # ClusterRole/ClusterRoleBinding for demo-wall are NOT patched here —
              # they are defined in session.objects above where $(session_namespace)
              # substitution works correctly and avoids cross-session conflicts.
              namespace: $(session_namespace)
              patches:
                # demo-wall: which namespace to monitor + which ArgoCD app to track
                - patch: |-
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: demo-wall-config
                    data:
                      APP_NAMESPACE: "$(session_namespace)"
                      ARGOCD_APP: "rx-demo-$(session_name)"
                  target:
                    kind: ConfigMap
                    name: demo-wall-config
                # loadgen target URL must point to per-session frontend
                - patch: |-
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: loadgen-config
                    data:
                      TARGET_HOST: "http://frontend.$(session_namespace).svc.cluster.local"
                  target:
                    kind: ConfigMap
                    name: loadgen-config
          destination:
            server: https://kubernetes.default.svc
            namespace: $(session_namespace)
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=false
      # Fix: Cilium on NKP blocks all intra-cluster traffic for app pods (session namespace)
      # unless a CiliumNetworkPolicy explicitly permits it. Standard K8s NetworkPolicy
      # ipBlock rules are insufficient — Cilium overrides with its own default-deny logic.
      # This CNP allows all intra-cluster + world egress/ingress for app pods.
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: allow-all-intra-cluster
          namespace: $(session_namespace)
        spec:
          endpointSelector: {}
          ingress:
            - fromEntities:
                - cluster
          egress:
            - toEntities:
                - cluster
                - world

  environment:
    objects:
      # Grant all session SAs in this environment read access to the DKP credentials secret.
      # The secret itself is created by bootstrap-educates.sh (not hardcoded here).
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: dkp-credentials-reader
        rules:
          - apiGroups: [""]
            resources: ["secrets"]
            resourceNames: ["dkp-workshop-credentials"]
            verbs: ["get"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: dkp-credentials-reader
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: dkp-credentials-reader
        subjects:
          - kind: Group
            name: system:serviceaccounts:$(environment_name)
            apiGroup: rbac.authorization.k8s.io
      # Fix: Cilium on NKP blocks ClusterIP + kube-dns for session pods via ipBlock rules.
      # This CiliumNetworkPolicy explicitly allows kube-apiserver + kube-dns egress.
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: educates-allow-cluster-egress
        spec:
          endpointSelector: {}
          egress:
            - toEntities:
                - kube-apiserver
                - world
            - toEndpoints:
                - matchLabels:
                    k8s-app: kube-dns
                    io.kubernetes.pod.namespace: kube-system
              toPorts:
                - ports:
                    - port: "53"
                      protocol: UDP
                    - port: "53"
                      protocol: TCP
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: nkp-workshop-ui
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: kommander-default-workspace
                    app.kubernetes.io/name: traefik
              toPorts:
                - ports:
                    - port: "8443"
                      protocol: TCP

    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: $(session_name)-cluster-reader
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: nkp-workshop-cluster-reader
      subjects:
      - kind: ServiceAccount
        name: $(session_name)
        namespace: $(session_namespace)
