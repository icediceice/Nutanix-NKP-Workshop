apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: nkp-workshop
spec:
  title: "NKP Hands-On Workshop"
  description: "Deploy, observe, ship, troubleshoot, and govern — hands-on with a live NKP cluster."
  url: https://github.com/icediceice/Nutanix-NKP-Workshop

  workshop:
    files:
      - git:
          url: https://github.com/icediceice/Nutanix-NKP-Workshop
          ref: main
        includePaths:
          - /workshops/nkp-workshop/workshop/**
          - /workshops/nkp-workshop/exercises/**
        newRootPath: workshops/nkp-workshop

  session:
    namespaces:
      budget: x-large
      limits:
        max:
          cpu: "16"
          memory: "32Gi"
      secondary:
        - name: $(session_name)-ops
          budget: small

    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: false
      docker:
        enabled: false
      vcluster:
        enabled: false

    dashboards:
      - name: Storefront
        url: http://frontend.$(session_namespace).svc.cluster.local
      - name: ArgoCD
        url: https://argocd.$(ingress_domain)/applications/argocd/rx-demo-$(session_name)
      - name: Kiali
        url: https://$(ingress_domain)/dkp/kiali/console/graph/namespaces/?namespaces=$(session_namespace)
      - name: Jaeger
        url: https://$(ingress_domain)/dkp/jaeger/search?service=frontend&namespace=$(session_namespace)
      - name: Grafana
        url: https://$(ingress_domain)/dkp/logging/grafana
      - name: Demo Wall
        url: http://demo-wall.$(session_name)-ops.svc.cluster.local:9090
      - name: NKP Console
        url: https://$(ingress_domain)/dkp/kommander/dashboard

    env:
      - name: WORKSHOP_NAMESPACE
        value: $(session_namespace)
      - name: OPS_NAMESPACE
        value: $(session_name)-ops
      - name: ARGOCD_NAMESPACE
        value: argocd
      - name: SESSION_NAME
        value: $(session_name)
      - name: ARGOCD_APP
        value: rx-demo-$(session_name)

    objects:
      - apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: rx-demo-$(session_name)
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/icediceice/Nutanix-NKP-Workshop.git
            targetRevision: main
            path: workshops/nkp-workshop/apps/storefront/overlays/lab-01-start
          destination:
            server: https://kubernetes.default.svc
            namespace: $(session_namespace)
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=false

  environment:
    objects:
      # Fix: Cilium on NKP blocks ClusterIP + kube-dns for session pods via ipBlock rules.
      # This CiliumNetworkPolicy explicitly allows kube-apiserver + kube-dns egress.
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: educates-allow-cluster-egress
        spec:
          endpointSelector: {}
          egress:
            - toEntities:
                - kube-apiserver
                - world
            - toEndpoints:
                - matchLabels:
                    k8s-app: kube-dns
                    io.kubernetes.pod.namespace: kube-system
              toPorts:
                - ports:
                    - port: "53"
                      protocol: UDP
                    - port: "53"
                      protocol: TCP
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
