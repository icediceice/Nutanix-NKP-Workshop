apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: nkp-workshop
spec:
  title: "NKP Hands-On Workshop"
  description: "Deploy, observe, ship, troubleshoot, and govern — hands-on with a live NKP cluster."
  url: https://github.com/icediceice/Nutanix-NKP-Workshop

  publish:
    image: ghcr.io/icediceice/nkp-workshop-files:latest

  workshop:
    files:
      - image:
          url: ghcr.io/icediceice/nkp-workshop-files:latest
      # Git overlay: provides fixed setup.d scripts directly from repo,
      # overriding the stale published image version (CRLF + set -e issue).
      - git:
          url: https://github.com/icediceice/Nutanix-NKP-Workshop
          ref: main
        newRootPath: workshops/nkp-workshop

  session:
    namespaces:
      budget: x-large
      limits:
        max:
          cpu: "16"
          memory: "32Gi"
      secondary:
        - name: $(session_name)-ops
          budget: small

    applications:
      workshop:
        enabled: true
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: false
      docker:
        enabled: false
      vcluster:
        enabled: false

    dashboards:
      - name: Storefront
        url: http://frontend.$(session_namespace).svc.cluster.local
      - name: ArgoCD
        url: http://10.8.16.55/applications/argocd/rx-demo-$(session_name)
      - name: Kiali
        url: https://$(ingress_domain)/dkp/kiali/console/graph/namespaces/?namespaces=$(session_namespace)
      - name: Jaeger
        url: https://$(ingress_domain)/dkp/jaeger/search?service=frontend&namespace=$(session_namespace)
      - name: Grafana
        url: https://$(ingress_domain)/dkp/logging/grafana
      - name: Demo Wall
        url: http://demo-wall.$(session_namespace).svc.cluster.local:9090
      - name: NKP Console
        url: https://10.8.16.16/dkp/kommander/dashboard

    env:
      - name: WORKSHOP_NAMESPACE
        value: $(session_namespace)
      - name: OPS_NAMESPACE
        value: $(session_name)-ops
      - name: ARGOCD_NAMESPACE
        value: argocd
      - name: SESSION_NAME
        value: $(session_name)
      - name: ARGOCD_APP
        value: rx-demo-$(session_name)

    objects:
      # Grant cluster-read access so attendees can run kubectl get nodes/namespaces/pv/sc
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: $(session_name)-cluster-reader
        rules:
          - apiGroups: [""]
            resources: ["nodes", "namespaces", "persistentvolumes"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses"]
            verbs: ["get", "list", "watch"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: $(session_name)-cluster-reader
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: $(session_name)-cluster-reader
        subjects:
          - kind: ServiceAccount
            name: $(session_name)
            namespace: $(environment_name)
      - apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: rx-demo-$(session_name)
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/icediceice/Nutanix-NKP-Workshop.git
            targetRevision: main
            path: workshops/nkp-workshop/apps/storefront/overlays/lab-01-start
            kustomize:
              # Override all resource namespaces to the per-session namespace.
              # kustomize namespace transformer also updates ClusterRoleBinding subjects[].
              namespace: $(session_namespace)
              patches:
                # Rename cluster-scoped RBAC per session to avoid cross-session conflicts.
                - patch: |-
                    apiVersion: rbac.authorization.k8s.io/v1
                    kind: ClusterRole
                    metadata:
                      name: demo-wall-reader-$(session_namespace)
                  target:
                    kind: ClusterRole
                    name: demo-wall-reader
                - patch: |-
                    apiVersion: rbac.authorization.k8s.io/v1
                    kind: ClusterRoleBinding
                    metadata:
                      name: demo-wall-reader-$(session_namespace)
                    roleRef:
                      apiGroup: rbac.authorization.k8s.io
                      kind: ClusterRole
                      name: demo-wall-reader-$(session_namespace)
                  target:
                    kind: ClusterRoleBinding
                    name: demo-wall-reader
                # demo-wall needs to know which namespace to monitor
                - patch: |-
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: demo-wall-config
                    data:
                      APP_NAMESPACE: "$(session_namespace)"
                  target:
                    kind: ConfigMap
                    name: demo-wall-config
                # loadgen target URL must point to per-session frontend
                - patch: |-
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: loadgen-config
                    data:
                      TARGET_HOST: "http://frontend.$(session_namespace).svc.cluster.local"
                  target:
                    kind: ConfigMap
                    name: loadgen-config
          destination:
            server: https://kubernetes.default.svc
            namespace: $(session_namespace)
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=false

  environment:
    objects:
      # Fix: Cilium on NKP blocks ClusterIP + kube-dns for session pods via ipBlock rules.
      # This CiliumNetworkPolicy explicitly allows kube-apiserver + kube-dns egress.
      - apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: educates-allow-cluster-egress
        spec:
          endpointSelector: {}
          egress:
            - toEntities:
                - kube-apiserver
                - world
            - toEndpoints:
                - matchLabels:
                    k8s-app: kube-dns
                    io.kubernetes.pod.namespace: kube-system
              toPorts:
                - ports:
                    - port: "53"
                      protocol: UDP
                    - port: "53"
                      protocol: TCP
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: kube-system
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: nkp-workshop-ui
            - toEndpoints:
                - matchLabels:
                    io.kubernetes.pod.namespace: kommander-default-workspace
                    app.kubernetes.io/name: traefik
              toPorts:
                - ports:
                    - port: "8443"
                      protocol: TCP
