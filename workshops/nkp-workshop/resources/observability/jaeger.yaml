---
# ArgoCD Application: installs Jaeger all-in-one via Helm into istio-system.
# Chart 4.5.0 / Jaeger v2.15.1 uses OTEL Collector config format.
# allInOne.args has no effect (args: null in the generated Deployment).
# base_path MUST be set via userconfig.extensions.jaeger_query.base_path.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jaegertracing.github.io/helm-charts
    chart: jaeger
    targetRevision: "4.5.0"
    helm:
      valuesObject:
        allInOne:
          enabled: true
        collector:
          enabled: false
        query:
          enabled: false
        agent:
          enabled: false
        storage:
          type: none
        # Full OTEL Collector config. Required to set base_path for the
        # query UI — the allInOne.args field is ignored by chart 4.5.0.
        userconfig:
          service:
            extensions: [jaeger_storage, jaeger_query, healthcheckv2]
            pipelines:
              traces:
                receivers: [otlp, jaeger]
                processors: [batch]
                exporters: [jaeger_storage_exporter]
          extensions:
            healthcheckv2:
              use_v2: true
              http:
                endpoint: 0.0.0.0:13133
            jaeger_query:
              base_path: /dkp/jaeger
              storage:
                traces: memstore
            jaeger_storage:
              backends:
                memstore:
                  memory:
                    max_traces: 100000
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
            jaeger:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:14250
                thrift_http:
                  endpoint: 0.0.0.0:14268
                thrift_compact:
                  endpoint: 0.0.0.0:6831
          processors:
            batch: {}
          exporters:
            jaeger_storage_exporter:
              trace_storage: memstore
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
---
# Ingress must live in istio-system namespace so Traefik can resolve jaeger
# directly (ExternalName services are blocked by Traefik).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger
  namespace: istio-system
  annotations:
    kubernetes.io/ingress.class: kommander-traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - http:
        paths:
          - path: /dkp/jaeger
            pathType: ImplementationSpecific
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
