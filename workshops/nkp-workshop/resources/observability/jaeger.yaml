---
# ArgoCD Application: installs Jaeger all-in-one via Helm into istio-system
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jaegertracing.github.io/helm-charts
    chart: jaeger
    targetRevision: "*"
    helm:
      valuesObject:
        # All-in-one mode: single pod with collector + query + agent
        allInOne:
          enabled: true
          args:
            - --query.base-path=/dkp/jaeger
        # Disable individual components (all-in-one handles them)
        collector:
          enabled: false
        query:
          enabled: false
        agent:
          enabled: false
        storage:
          type: none
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
---
# Ingress must live in istio-system namespace so Traefik can resolve jaeger
# directly (ExternalName services are blocked by Traefik).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger
  namespace: istio-system
  annotations:
    kubernetes.io/ingress.class: kommander-traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - http:
        paths:
          - path: /dkp/jaeger
            pathType: ImplementationSpecific
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
