apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-stress
  namespace: demo-app
  labels:
    app: quota-stress
spec:
  replicas: 20
  selector:
    matchLabels:
      app: quota-stress
  template:
    metadata:
      labels:
        app: quota-stress
        version: v1
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
