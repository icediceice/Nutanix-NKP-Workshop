apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-rolebinding-demo-app
  namespace: demo-app
subjects:
  - kind: ServiceAccount
    name: dev-user
    namespace: demo-app
roleRef:
  kind: Role
  name: dev-role-demo-app
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-user
  namespace: demo-app
