apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-mock-vs
  namespace: demo-app
spec:
  hosts:
    - payment-mock
  http:
    - route:
        - destination:
            host: payment-mock
            subset: v1
          weight: 0
        - destination:
            host: payment-mock
            subset: v2
          weight: 100
