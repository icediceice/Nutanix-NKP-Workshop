apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-writer
  namespace: demo-app
  labels:
    app: shared-writer
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shared-writer
  template:
    metadata:
      labels:
        app: shared-writer
        version: v1
    spec:
      containers:
        - name: writer
          image: busybox:latest
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared-data
