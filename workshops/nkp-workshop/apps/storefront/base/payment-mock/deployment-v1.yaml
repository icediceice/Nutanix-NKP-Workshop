apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-mock-v1
  namespace: demo-app
  labels:
    app: payment-mock
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-mock
      version: v1
  template:
    metadata:
      labels:
        app: payment-mock
        version: v1
      annotations:
        sidecar.istio.io/proxyCPU: "10m"
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemory: "64Mi"
        sidecar.istio.io/proxyMemoryLimit: "256Mi"
    spec:
      serviceAccountName: payment-mock
      securityContext:
        runAsNonRoot: true
      containers:
        - name: payment-mock
          image: hashicorp/http-echo:latest
          args: ["-listen=:8080", "-text=payment-mock v1 ok"]
          ports:
            - containerPort: 8080
          env:
            - name: VERSION_LABEL
              value: "v1"
            - name: INJECT_LATENCY_MS
              value: "0"
            - name: INJECT_ERROR_RATE
              value: "0.0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://opentelemetry-collector.monitoring:4317"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
