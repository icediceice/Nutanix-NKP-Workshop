# Lab 4 uses frontend-only to show the platform is alive without full mesh complexity.
# Import frontend Deployment and Service only from the base.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo-app
  labels:
    app: frontend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: rx-storefront/frontend:1.0
          ports:
            - containerPort: 80
          env:
            - name: CHECKOUT_API_URL
              value: "http://checkout-api:8080"
            - name: CATALOG_URL
              value: "http://catalog:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
