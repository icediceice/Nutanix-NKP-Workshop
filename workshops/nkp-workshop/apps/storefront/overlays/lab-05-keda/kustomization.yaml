apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Lab 5 KEDA: checkout-api scales to zero; KEDA ScaledObject drives replicas.
resources:
  - ../../base/
  - ../../../../platform/istio/virtualservice-canary-10.yaml
  - ../../../../platform/quotas/resourcequota-demo-app.yaml
  - ../../../../platform/keda/scaledobject-checkout.yaml
  - ../../../../demo-wall/overlays/lab-05-keda/
  - ../../../../loadgen/overlays/load-baseline/
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: Deployment
      name: checkout-api
