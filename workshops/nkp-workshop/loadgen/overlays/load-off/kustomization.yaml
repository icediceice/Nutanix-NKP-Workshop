apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /data/LOAD_PROFILE
        value: "off"
    target:
      kind: ConfigMap
      name: loadgen-config
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: Deployment
      name: demo-loadgen
