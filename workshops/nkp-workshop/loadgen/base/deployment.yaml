apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-loadgen
  namespace: demo-ops
  labels:
    app: demo-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-loadgen
  template:
    metadata:
      labels:
        app: demo-loadgen
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: loadgen
          image: fortio/fortio:latest
          command: ["fortio", "load", "-qps", "5", "-t", "0", "-c", "2", "http://checkout-api:8080/"]
          envFrom:
            - configMapRef:
                name: loadgen-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
