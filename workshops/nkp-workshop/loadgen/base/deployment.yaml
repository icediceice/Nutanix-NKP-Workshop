apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-loadgen
  namespace: demo-ops
  labels:
    app: demo-loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-loadgen
  template:
    metadata:
      labels:
        app: demo-loadgen
        version: v1
      annotations:
        sidecar.istio.io/proxyCPU: "10m"
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemory: "64Mi"
        sidecar.istio.io/proxyMemoryLimit: "256Mi"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        # Frontend load — hits the main storefront entry point
        - name: loadgen-frontend
          image: fortio/fortio:latest
          command: ["fortio", "load", "-qps", "2", "-t", "0", "-c", "2"]
          args: ["$(TARGET_HOST)/"]
          envFrom:
            - configMapRef:
                name: loadgen-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        # Checkout-api load — simulates checkout flow (calls payment-mock internally)
        - name: loadgen-checkout
          image: fortio/fortio:latest
          command: ["fortio", "load", "-qps", "0.5", "-t", "0", "-c", "1",
                    "http://checkout-api:8080/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        # Catalog load — drives traffic to catalog service
        - name: loadgen-catalog
          image: fortio/fortio:latest
          command: ["fortio", "load", "-qps", "1", "-t", "0", "-c", "1",
                    "http://catalog:8080/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        # Payment-mock load — drives traffic to payment service
        - name: loadgen-payment
          image: fortio/fortio:latest
          command: ["fortio", "load", "-qps", "0.5", "-t", "0", "-c", "1",
                    "http://payment-mock:8080/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
