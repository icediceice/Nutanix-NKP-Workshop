apiVersion: v1
kind: Pod
metadata:
  name: policy-violation-example
  # Namespace set to $SESSION_NS via kubectl -n flag
  labels:
    app: policy-test
    # NOTE: 'version' label is intentionally MISSING — triggers Gatekeeper violation
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
