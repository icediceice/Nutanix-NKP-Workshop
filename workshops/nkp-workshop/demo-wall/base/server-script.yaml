apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-wall-server
  namespace: demo-ops
data:
  server.py: |
    #!/usr/bin/env python3
    """Demo Wall — live workshop dashboard served from a ConfigMap-mounted script."""
    import os, json, ssl, http.server
    from urllib.request import urlopen, Request
    from urllib.error import URLError, HTTPError

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    K8S_API    = "https://kubernetes.default.svc"

    def k8s_get(path):
        try:
            token = open(TOKEN_PATH).read().strip()
            ctx = ssl.create_default_context(cafile=CA_PATH)
            req = Request(K8S_API + path, headers={"Authorization": "Bearer " + token})
            with urlopen(req, context=ctx, timeout=5) as r:
                return json.loads(r.read())
        except Exception as e:
            return {"error": str(e), "items": []}

    STATUS_COLOR = {
        "Running":   "#3fb950",
        "Pending":   "#d29922",
        "Succeeded": "#58a6ff",
        "Failed":    "#f85149",
        "Unknown":   "#8b949e",
    }

    def pod_badge(phase, ready, total):
        color = STATUS_COLOR.get(phase, "#8b949e")
        if phase == "Running" and ready < total:
            color = "#d29922"
        return (
            f'<td><span style="color:{color};font-weight:bold">{phase}</span></td>'
            f'<td style="color:{color}">{ready}/{total}</td>'
        )

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200); self.end_headers()
                self.wfile.write(b"ok"); return

            ns       = os.environ.get("APP_NAMESPACE",    "demo-app")
            lab_num  = os.environ.get("LAB_NUMBER",       "0")
            lab_title= os.environ.get("LAB_TITLE",        "NKP Workshop")
            intent   = os.environ.get("SCENARIO_INTENT",  "")
            scenario = os.environ.get("SCENARIO_NAME",    "default")

            pods_raw  = k8s_get(f"/api/v1/namespaces/{ns}/pods")
            depls_raw = k8s_get(f"/apis/apps/v1/namespaces/{ns}/deployments")

            # ── Pods table ────────────────────────────────────────────────────
            pod_rows = ""
            for pod in pods_raw.get("items", []):
                name  = pod["metadata"]["name"]
                phase = pod["status"].get("phase", "Unknown")
                c_statuses = pod["status"].get("containerStatuses", [])
                ready = sum(1 for c in c_statuses if c.get("ready"))
                total = len(c_statuses) or len(pod["spec"].get("containers", []))
                restarts = sum(c.get("restartCount", 0) for c in c_statuses)
                rst_color = "#f85149" if restarts > 5 else "#8b949e"
                pod_rows += (
                    f"<tr><td>{name}</td>"
                    + pod_badge(phase, ready, total) +
                    f'<td style="color:{rst_color}">{restarts}</td></tr>'
                )

            # ── Deployments summary ───────────────────────────────────────────
            depl_rows = ""
            for d in depls_raw.get("items", []):
                dname    = d["metadata"]["name"]
                desired  = d["spec"].get("replicas", 1)
                ready_d  = d["status"].get("readyReplicas", 0)
                color_d  = "#3fb950" if ready_d == desired else "#d29922"
                depl_rows += (
                    f"<tr><td>{dname}</td>"
                    f'<td style="color:{color_d}">{ready_d}/{desired}</td></tr>'
                )

            # ── ArgoCD app status ─────────────────────────────────────────────
            argocd_ns  = os.environ.get("ARGOCD_NAMESPACE", "argocd")
            app_name   = os.environ.get("ARGOCD_APP", "")
            argo_html  = ""
            if app_name:
                app_data = k8s_get(
                    f"/apis/argoproj.io/v1alpha1/namespaces/{argocd_ns}/applications/{app_name}"
                )
                if "error" not in app_data:
                    sync   = app_data.get("status", {}).get("sync",   {}).get("status", "Unknown")
                    health = app_data.get("status", {}).get("health", {}).get("status", "Unknown")
                    s_color = "#3fb950" if sync   == "Synced"  else "#d29922"
                    h_color = "#3fb950" if health == "Healthy" else "#d29922"
                    argo_html = f"""
            <h2>ArgoCD — {app_name}</h2>
            <table><tr>
              <td>Sync</td><td style="color:{s_color};font-weight:bold">{sync}</td>
              <td>Health</td><td style="color:{h_color};font-weight:bold">{health}</td>
            </tr></table>"""

            html = f"""<!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <meta http-equiv="refresh" content="5">
      <title>Demo Wall — {lab_title}</title>
      <style>
        *{{box-sizing:border-box;margin:0;padding:0}}
        body{{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;padding:1.5rem;font-size:14px}}
        h1{{color:#58a6ff;font-size:1.4rem;margin-bottom:.25rem}}
        h2{{color:#8b949e;font-size:.9rem;text-transform:uppercase;letter-spacing:.08em;
            margin:1.2rem 0 .4rem;border-bottom:1px solid #21262d;padding-bottom:.3rem}}
        .sub{{color:#8b949e;font-size:.85rem;margin-bottom:1rem}}
        .badge{{display:inline-block;padding:1px 8px;border-radius:10px;background:#1f6feb;
                font-size:.75rem;margin-left:.4rem;vertical-align:middle}}
        table{{width:100%;border-collapse:collapse;margin-bottom:.5rem}}
        th,td{{padding:5px 10px;text-align:left;border:1px solid #21262d;font-size:.85rem}}
        th{{background:#161b22;color:#8b949e;font-weight:600}}
        tr:hover td{{background:#161b22}}
        .footer{{margin-top:1.5rem;color:#484f58;font-size:.75rem}}
      </style>
    </head>
    <body>
      <h1>Demo Wall <span class="badge">Lab {lab_num}</span></h1>
      <p class="sub">{lab_title}{(' — ' + intent) if intent else ''}</p>

      <h2>Pods — {ns}</h2>
      <table>
        <tr><th>Name</th><th>Phase</th><th>Ready</th><th>Restarts</th></tr>
        {pod_rows or '<tr><td colspan=4 style="color:#8b949e">No pods found</td></tr>'}
      </table>

      <h2>Deployments — {ns}</h2>
      <table>
        <tr><th>Name</th><th>Ready</th></tr>
        {depl_rows or '<tr><td colspan=2 style="color:#8b949e">No deployments found</td></tr>'}
      </table>

      {argo_html}

      <p class="footer">Scenario: {scenario} &nbsp;·&nbsp; Auto-refresh 5s &nbsp;·&nbsp; Namespace: {ns}</p>
    </body>
    </html>"""

            body = html.encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            print(f"{self.address_string()} {fmt % args}", flush=True)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", 9090))
        srv = http.server.HTTPServer(("", port), Handler)
        print(f"[INFO] demo-wall listening on :{port}", flush=True)
        srv.serve_forever()
