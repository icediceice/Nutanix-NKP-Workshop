apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-wall
  namespace: demo-ops
  labels:
    app: demo-wall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-wall
  template:
    metadata:
      labels:
        app: demo-wall
        version: v1
      annotations:
        sidecar.istio.io/proxyCPU: "10m"
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemory: "64Mi"
        sidecar.istio.io/proxyMemoryLimit: "256Mi"
    spec:
      serviceAccountName: demo-wall
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      volumes:
        - name: server-script
          configMap:
            name: demo-wall-server
      containers:
        - name: demo-wall
          image: python:3.11-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: demo-wall-config
          volumeMounts:
            - name: server-script
              mountPath: /app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
