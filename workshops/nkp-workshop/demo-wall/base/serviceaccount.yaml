apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-wall
  namespace: demo-ops
# ClusterRole and ClusterRoleBinding are cluster-scoped and cannot be safely
# renamed per-session via kustomize patches in ArgoCD. They are created instead
# via Educates session.objects in workshop.yaml, with $(session_namespace)
# substitution, ensuring each session gets uniquely-named RBAC.
