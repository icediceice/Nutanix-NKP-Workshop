apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-wall
  namespace: demo-ops
---
# ClusterRole: read-only access to resources the Demo Wall monitors
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: demo-wall-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "services", "resourcequotas", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["constraints.gatekeeper.sh"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: demo-wall-reader
subjects:
  - kind: ServiceAccount
    name: demo-wall
    namespace: demo-ops
roleRef:
  kind: ClusterRole
  name: demo-wall-reader
  apiGroup: rbac.authorization.k8s.io
