apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: infra-nkp-platform
spec:
  title: "NKP Infrastructure Platform"
  description: "Workspaces, cluster lifecycle, RBAC access policies, storage classes, backup & DR"
  url: "https://github.com/icediceice/Nutanix-NKP-Workshop"
  workshop:
    files:
      - image:
          url: "ghcr.io/icediceice/infra-nkp-platform-files:latest"
        includePaths:
          - /workshop/**
          - /exercises/**
  session:
    namespaces:
      budget: x-large
      security:
        policy: privileged    # Elevated RBAC needed for cluster-level operations
    applications:
      terminal:
        enabled: true
      console:
        enabled: true
      editor:
        enabled: true
      docker:
        enabled: false
      registry:
        enabled: false

    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: $(session_name)-cluster-reader
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: nkp-workshop-cluster-reader
      subjects:
      - kind: ServiceAccount
        name: $(session_name)
        namespace: $(session_namespace)
