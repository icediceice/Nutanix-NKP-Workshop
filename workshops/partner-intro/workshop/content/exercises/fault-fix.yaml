# Removes latency from payment-mock
# Usage: kubectl patch deploy payment-mock-v1 -n <ns> --patch-file exercises/fault-fix.yaml
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: SERVICE_NAME
              value: payment-mock
            - name: SERVICE_VERSION
              value: v1
            - name: FAIL_MODE
              value: ok
            - name: LATENCY_MS
              value: "0"
            - name: ERROR_RATE
              value: "0"
