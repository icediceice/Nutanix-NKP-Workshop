apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: traffic
        image: python:3.11-alpine
        command:
        - python3
        - -c
        - |
          import urllib.request, json, time
          while True:
              try:
                  urllib.request.urlopen("http://frontend/catalog")
              except: pass
              try:
                  req = urllib.request.Request("http://checkout-api/checkout",
                      data=json.dumps({"items":["item-1"]}).encode(),
                      headers={"Content-Type":"application/json"}, method="POST")
                  urllib.request.urlopen(req)
              except: pass
              time.sleep(2)
