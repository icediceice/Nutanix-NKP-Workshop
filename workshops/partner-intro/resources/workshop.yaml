apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: partner-intro
spec:
  title: "NKP Partner Introduction"
  description: "90-minute guided intro — container fundamentals, Kommander platform tour, and live ecommerce demo with service mesh observability"
  url: "https://github.com/icediceice/Nutanix-NKP-Workshop"
  workshop:
    files:
      - image:
          url: "ghcr.io/icediceice/partner-intro-files:latest"
        includePaths:
          - /workshop/**
  session:
    namespaces:
      budget: custom
      security:
        policy: privileged
    applications:
      terminal:
        enabled: true
      console:
        enabled: false
      editor:
        enabled: false

    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: $(session_name)-cluster-admin
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
      - kind: ServiceAccount
        name: $(session_name)
        namespace: $(workshop_namespace)
