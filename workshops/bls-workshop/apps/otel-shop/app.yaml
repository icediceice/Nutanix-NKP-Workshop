# otel-shop-lite — 4-service ecommerce demo
# frontend → catalog-api, checkout-api → payment-mock
# OTEL traces sent to Jaeger collector in istio-system (pre-enabled by facilitator).
# Istio sidecars injected via namespace label — Kiali shows live service topology.
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: ghcr.io/icediceice/otel-shop-lite-frontend:v1-story-20260219f
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: frontend
            - name: SERVICE_VERSION
              value: v1
            - name: CATALOG_URL
              value: http://catalog-api
            - name: CHECKOUT_URL
              value: http://checkout-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger-collector.istio-system.svc:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
spec:
  selector:
    app: catalog-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: app
          image: ghcr.io/icediceice/otel-shop-lite-catalog-api:v1
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: catalog-api
            - name: SERVICE_VERSION
              value: v1
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger-collector.istio-system.svc:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
spec:
  selector:
    app: checkout-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: app
          image: ghcr.io/icediceice/otel-shop-lite-checkout-api:v1
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: checkout-api
            - name: SERVICE_VERSION
              value: v1
            - name: PAYMENT_URL
              value: http://payment-mock
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger-collector.istio-system.svc:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-mock
spec:
  selector:
    app: payment-mock
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-mock
  template:
    metadata:
      labels:
        app: payment-mock
    spec:
      containers:
        - name: app
          image: ghcr.io/icediceice/otel-shop-lite-payment-mock:v1
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: payment-mock
            - name: SERVICE_VERSION
              value: v1
            - name: FAIL_MODE
              value: ok
            - name: LATENCY_MS
              value: "0"
            - name: ERROR_RATE
              value: "0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger-collector.istio-system.svc:4317
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
