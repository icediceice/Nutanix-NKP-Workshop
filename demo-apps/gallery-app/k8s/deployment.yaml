---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-app
  labels:
    app: gallery-app
    tier: frontend
    workshop: nkp-workshop
  annotations:
    team: "platform-engineering"
    contact: "platform@example.com"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gallery-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gallery-app
        tier: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
      containers:
        - name: gallery-app
          image: gallery-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: gallery-app
  labels:
    app: gallery-app
spec:
  type: ClusterIP
  selector:
    app: gallery-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
