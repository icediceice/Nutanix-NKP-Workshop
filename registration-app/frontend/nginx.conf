server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend
    location /api/ {
        proxy_pass http://nkp-lab-manager-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://nkp-lab-manager-backend:8000/health;
    }

    # Certificate setup endpoints — served by backend, not the SPA
    # /setup/ca.crt, /setup/install-cert.*, /setup/config, /setup/ping
    location ~ ^/setup/(ca\.crt|install-cert\.(ps1|bat|zip)|config|ping)$ {
        proxy_pass http://nkp-lab-manager-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — /setup (no trailing path) and all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
