# Traefik IngressRoute — Registration App (HTTPS only)
#
# NOTE: The /setup cert-install page MUST be accessed via NodePort (port 30080),
# not via this IngressRoute. Kommander's Traefik redirects all HTTP→HTTPS at the
# entrypoint level, so any HTTP IngressRoute would redirect users to HTTPS before
# they can install the cert — defeating the purpose.
#
# Setup page URL (HTTP, no Traefik):
#   http://<node-ip>:30080/setup?redirect=<portal-url>
#
# This IngressRoute is for post-install HTTPS access to the admin interface:
#   https://nkp-lab-manager.<domain>/
#
# Apply:
#   DOMAIN=10.8.16.19.nip.io envsubst < ingressroute.yaml | kubectl apply -f -

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nkp-lab-manager-https
  namespace: nkp-lab-manager
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nkp-lab-manager.${DOMAIN}`)
      kind: Rule
      services:
        - name: nkp-lab-manager-frontend
          port: 80
  tls: {}   # uses Traefik default TLSStore (wildcard cert installed by bootstrap)
