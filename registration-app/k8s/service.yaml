apiVersion: v1
kind: Service
metadata:
  name: nkp-lab-manager-backend
  namespace: nkp-lab-manager
spec:
  selector:
    app: nkp-lab-manager
    component: backend
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: nkp-lab-manager-frontend
  namespace: nkp-lab-manager
spec:
  type: NodePort
  selector:
    app: nkp-lab-manager
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
