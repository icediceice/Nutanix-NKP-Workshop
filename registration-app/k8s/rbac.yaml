apiVersion: v1
kind: ServiceAccount
metadata:
  name: nkp-lab-manager
  namespace: nkp-lab-manager

---
# ClusterRole: read nodes, read namespaces (for health checks)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nkp-lab-manager
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nkp-lab-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nkp-lab-manager
subjects:
  - kind: ServiceAccount
    name: nkp-lab-manager
    namespace: nkp-lab-manager
